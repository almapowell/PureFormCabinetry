<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Instant Quote | Pure Form Cabinetry — Custom Cabinets, Utah</title>
  <meta name="description" content="Get an instant, no-obligation quote for custom cabinets from Pure Form Cabinetry. Based in Eagle Mountain, serving all of Utah." />
  <link rel="canonical" href="https://www.pureformcabinetry.com/instant-quote" />

  <link rel="icon" href="/images/logo-mark.png" type="image/png" />
  <link rel="apple-touch-icon" href="/images/logo-mark.png" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.pureformcabinetry.com/instant-quote" />
  <meta property="og:title" content="Instant Quote | Pure Form Cabinetry" />
  <meta property="og:description" content="Get an instant, no-obligation quote for custom cabinets. Serving all of Utah." />
  <meta property="og:image" content="https://www.pureformcabinetry.com/images/kitchen-island.png" />
  <meta property="og:site_name" content="Pure Form Cabinetry" />
  <meta property="og:locale" content="en_US" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

  <!-- ======================================================
       NAVIGATION
  ====================================================== -->
  <header class="nav" id="nav">
    <div class="nav-inner">
      <a href="/" class="nav-logo" aria-label="Pure Form Cabinetry — Home">
        <img src="/images/logo-mark.png" alt="" class="nav-logo-mark" width="1024" height="576" decoding="async" />
        <div class="nav-logo-text">
          Pure Form
          <span>Cabinetry</span>
        </div>
      </a>

      <nav class="nav-links">
        <a href="/#home">Home</a>
        <a href="/#services">Services</a>
        <a href="/#gallery">Gallery</a>
        <a href="/#contact">Contact</a>
      </nav>

      <a href="tel:+13858886138" class="btn btn-primary nav-cta">Call Us</a>
    </div>
  </header>

  <!-- ======================================================
       INSTANT QUOTE
       Paste your instant quote code inside the section below.
  ====================================================== -->
  <main class="instant-quote-page">
    <div class="iq-wrap">
      <!-- The quote tool is a self-contained, full-screen app embedded below.
           The frame fills the viewport and the app scrolls internally, so it
           works reliably on phones and every screen size. Framed as a card so
           it reads as a designed widget rather than a bare column. -->
      <div class="iq-card">
        <iframe
          id="quote-frame"
          class="quote-frame"
          src="/instant-quote/quote-app.html"
          title="Pure Form Cabinetry — Free Cabinet Quote"
          allow="clipboard-write"
        ></iframe>
      </div>

      <a href="/" class="iq-back">← Back to Home</a>
    </div>
  </main>

  <style>
    .instant-quote-page {
      /* Clear the fixed nav, add breathing room, and a subtle on-brand glow
         so the card sits in an intentional space rather than flat black. */
      padding: 6rem 1.25rem 4.5rem;
      min-height: 100vh;
      min-height: 100dvh;
      background:
        radial-gradient(70% 55% at 50% 0%, rgba(204, 34, 34, 0.07), transparent 72%),
        var(--bg, #0d0d0d);
    }
    .iq-wrap {
      max-width: 600px;
      margin: 0 auto;
    }
    .iq-card {
      border: 1px solid var(--border, #2e2e2e);
      border-radius: 18px;
      overflow: hidden;
      background: var(--surface, #191919);
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.55);
    }
    .quote-frame {
      display: block;
      width: 100%;
      border: 0;
      background: var(--bg, #0d0d0d);
      /* The embedded tool is a full-screen app, so we give the frame a fixed
         height that fills the screen below the header and let the app scroll
         internally. This is reliable on every device — there's no JS height
         measurement that can come up short and clip the content off-screen.
         dvh tracks the real viewport as mobile browser chrome shows/hides. */
      height: calc(100vh - 9.5rem);
      height: calc(100dvh - 9.5rem);
      min-height: 460px;
    }
    .iq-back {
      display: inline-block;
      margin-top: 1.75rem;
      font-family: var(--font-head, sans-serif);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted, #999);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .iq-back:hover { color: var(--text, #f0f0f0); }

    /* ---- Header: keep the Call Us button visible on every screen ----
       The shared stylesheet hides .nav-cta below 768px and relies on a
       hamburger menu, but this page's header has no hamburger. So we keep
       the button pinned to the top-right and shrink the logo to make room. */
    @media (max-width: 768px) {
      .nav-cta {
        display: inline-flex;
        margin-left: auto;
        padding: 0.6rem 1.05rem;
        font-size: 0.8rem;
        white-space: nowrap;
      }
      .nav-logo-mark { max-width: min(calc(100vw - 11rem), 44vw); }
    }
    @media (max-width: 400px) {
      .nav-cta { padding: 0.55rem 0.85rem; font-size: 0.74rem; letter-spacing: 0.03em; }
      .nav-logo-text { display: none; }
    }

    @media (max-width: 640px) {
      .instant-quote-page { padding: 5rem 0.7rem 2.5rem; }
      .iq-card { border-radius: 14px; }
      .quote-frame {
        height: calc(100vh - 8.5rem);
        height: calc(100dvh - 8.5rem);
      }
    }
  </style>

  <!-- Script -->
  <script src="/js/main.js"></script>
</body>
</html>
